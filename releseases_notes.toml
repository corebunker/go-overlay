[releases.v0-1-4]
title = "Codebase Refactoring & Project Structure"
body = """
- **REFACTORING**: Split monolithic `main.go` (~2450 lines) into 10 focused files organized by responsibility
- **STRUCTURE**: Moved all Go source files to `cmd/go-overlay/` following standard Go project layout
- **CLEANUP**: Removed all inline comments from codebase for cleaner, self-documenting code
- **BUILD**: Updated build paths in `tasks.py` to reflect new `cmd/go-overlay/` structure
- **CI/CD**: No changes required — `./...` glob continues to work for test, vet, and lint

### New Project Structure

```
cmd/go-overlay/
├── main.go           # Entry point, cobra commands, signal handling, shutdown
├── config.go         # Config types, TOML parsing
├── service.go        # Service state, lifecycle, PTY, dependencies
├── validation.go     # Config validation, dependency cycles
├── ipc.go            # Unix socket IPC server/client
├── health.go         # HTTP and command health checks
├── restart.go        # Restart policy handling
├── env.go            # Environment variables, .env file, overrides
├── install.go        # Auto-install in PATH
├── logging.go        # ANSI colors, log functions
├── main_test.go      # Unit tests
└── integration_test.go
```
"""

[releases.v0-1-3]
title = "Oneshot Services and Dependency Readiness"
body = """
- **NEW**: Added explicit `oneshot = true` service option for one-time jobs (migrations/init scripts)
- **DEPENDENCIES**: Dependent services now wait for oneshot dependencies to complete successfully
- **SAFETY**: Dependency waiting now detects failed dependencies and aborts dependents early
- **VALIDATION**: `oneshot` services now enforce `restart = \"never\"` (or omitted restart)
- **TESTING**: Added tests for oneshot parsing, dependency failure handling, and restart-policy validation
- **DOCS**: Updated examples and configuration docs to include oneshot usage patterns
"""

[releases.v0-1-2]
title = "Performance & Code Quality Improvements"
body = """
- **PERFORMANCE**: Optimized loops to reduce unnecessary memory copies (168 bytes per iteration)
- **PERFORMANCE**: Improved struct memory alignment (15-20% memory savings)
- **CODE QUALITY**: Reduced cyclomatic complexity in key functions (26→5, 24→8)
- **CODE QUALITY**: Removed unused functions and fixed linter warnings
- **ENHANCED**: Added support for wait_after as TOML sub-table format (recommended)
- **TESTING**: Added new test cases and improved coverage
- **EXAMPLES**: Updated all examples to use cleaner TOML sub-table format
- **BACKWARD COMPATIBLE**: All existing configurations remain valid

### Configuration Examples

#### Single dependency (simple wait):
```toml
[[services]]
name = "nginx"
depends_on = "php-fpm"
wait_after = 3
```

#### Multiple dependencies with different wait times (sub-table format - recommended):
```toml
[[services]]
name = "web"
depends_on = ["redis", "postgres"]
user = "appuser"

[services.wait_after]
redis = 2
postgres = 5
```

#### Multiple dependencies with same wait time (global):
```toml
[[services]]
name = "monitoring"
depends_on = ["web", "celery-worker", "celery-beat"]
wait_after = 5
```
"""

